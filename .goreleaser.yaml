version: 2

builds:
  - binary: archcore
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "archcore_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

changelog:
  format: "[{{ printf \"%.7s\" .SHA }}](https://github.com/archcore-ai/cli/commit/{{ .SHA }}) {{ .Message }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256
